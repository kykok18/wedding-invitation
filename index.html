<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>The Wedding of Mario & Angela</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="cover-page">
    <!-- Background Photo -->
    <div class="cover-bg-photo"></div>

    <!-- Dark Overlay -->
    <div class="cover-overlay"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <main class="cover-container">
      <div class="cover-content glass-card">
        <p class="cover-subtitle">Save The Date</p>

        <h1 class="cover-names">
          <span class="name-script">Mario</span>
          <span class="name-ampersand">&</span>
          <span class="name-script">Angela</span>
        </h1>

        <div class="cover-date">
          <span class="date-day">28</span>
          <span class="date-separator">.</span>
          <span class="date-month">06</span>
          <span class="date-separator">.</span>
          <span class="date-year">2026</span>
        </div>

        <div class="cover-details">
          <p class="cover-time">
            <i class="fa-regular fa-clock"></i>
            Pukul 07:00 WIB - Selesai
          </p>
          <p class="cover-location">
            <i class="fa-solid fa-location-dot"></i>
            Gedung Serbaguna Jakarta
          </p>
        </div>

        <div class="cover-divider">
          <span class="divider-line"></span>
          <span class="divider-icon"><i class="fa-solid fa-rings-wedding"></i></span>
          <span class="divider-line"></span>
        </div>

        <a href="dashboard.html" class="btn-open-invitation">
          <span class="btn-text">Buka Undangan</span>
          <span class="btn-icon"><i class="fa-solid fa-envelope-open"></i></span>
        </a>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
